global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: miniidm-exporter
    static_configs:
      - targets:
          - miniidm-exporter:9120

  - job_name: haproxy
    metrics_path: /metrics
    static_configs:
      - targets:
          - haproxy:8404

  - job_name: blackbox-tcp
    metrics_path: /probe
    params:
      module:
        - tcp_connect
    static_configs:
      - targets:
          - kdc1.fis.epn.edu.ec:88
          - kdc2.fis.epn.edu.ec:88
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target

      - source_labels:
          - __param_target
        target_label: instance

      - target_label: __address__
        replacement: blackbox:9115

  - job_name: blackbox-tls
    metrics_path: /probe
    params:
      module:
        - tcp_tls
    static_configs:
      - targets:
          - ldap1.fis.epn.edu.ec:636
          - ldap2.fis.epn.edu.ec:636
          - ldap.fis.epn.edu.ec:636
          - web.fis.epn.edu.ec:443
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target

      - source_labels:
          - __param_target
        target_label: instance

      - target_label: __address__
        replacement: blackbox:9115

  - job_name: blackbox-web
    metrics_path: /probe
    params:
      module:
        - http_2xx_tls
    static_configs:
      - targets:
          - https://web.fis.epn.edu.ec/
    relabel_configs:
      - source_labels:
          - __address__
        target_label: __param_target

      - source_labels:
          - __param_target
        target_label: instance

      - target_label: __address__
        replacement: blackbox:9115
