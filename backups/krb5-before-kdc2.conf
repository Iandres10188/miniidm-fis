[libdefaults]
    default_realm = FIS.EPN.EC
    dns_lookup_realm = false
    dns_lookup_kdc = false
    rdns = false
    forwardable = true
    ticket_lifetime = 10h
    renew_lifetime = 7d
    udp_preference_limit = 1

[realms]
    FIS.EPN.EC = {
        kdc = kdc1.fis.epn.edu.ec
        admin_server = kdc1.fis.epn.edu.ec
    }

[domain_realm]
    .fis.epn.edu.ec = FIS.EPN.EC
    fis.epn.edu.ec = FIS.EPN.EC
